<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/qualeslogo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quales — Training world-class QA engineers and connecting them with Africa's leading fintech companies." />
    <title>Quales — Talent Training &amp; Outsourcing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify Forms detection (hidden, do not remove) -->
    <form name="talent-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="course" />
      <input type="text" name="experience" />
      <textarea name="motivation"></textarea>
    </form>

    <form name="company-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="company" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="teamSize" />
      <textarea name="needs"></textarea>
      <input type="text" name="timeline" />
    </form>
  </body>
</html>
